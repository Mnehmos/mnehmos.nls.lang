name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify examples compile
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          import sys

          example_files = sorted(Path("examples").glob("*.nl"))
          for nl_file in example_files:
              print(f"Verifying {nl_file}...")
              subprocess.run(
                  [sys.executable, "-m", "nlsc", "verify", str(nl_file)],
                  check=True,
              )

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Check formatting
        run: ruff check nlsc/ --select=E,F,W --ignore=E501

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run mypy
        run: mypy nlsc/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc on

  nls-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install nlsc
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify all .nl files
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          import sys

          for nl_file in sorted(Path(".").rglob("*.nl")):
              print(f"Verifying {nl_file}...")
              subprocess.run(
                  [sys.executable, "-m", "nlsc", "verify", str(nl_file)],
                  check=True,
              )

      - name: Check lockfiles are current
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          import sys

          for nl_file in sorted(Path(".").rglob("*.nl")):
              lock_file = Path(f"{nl_file}.lock")
              if lock_file.exists():
                  print(f"Checking lockfile for {nl_file}...")
                  result = subprocess.run(
                      [sys.executable, "-m", "nlsc", "lock:check", str(nl_file)],
                      text=True,
                      capture_output=True,
                  )
                  if result.returncode != 0:
                      print(f"Warning: Lockfile out of date for {nl_file}")
                      if result.stdout:
                          print(result.stdout, end="")
                      if result.stderr:
                          print(result.stderr, end="", file=sys.stderr)
